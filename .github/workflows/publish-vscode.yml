name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate changelog contains tag version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          node -e '
            const fs = require("fs");
            const tagVersion = process.argv[1];
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const lines = changelog.split(/\r?\n/);
            const hasVersionHeading = lines.some((line) =>
              line.startsWith(`## [${tagVersion}]`)
            );
            if (!hasVersionHeading) {
              console.error(
                `CHANGELOG.md is missing a heading for version ${tagVersion}. Expected a line starting with "## [${tagVersion}]".`
              );
              process.exit(1);
            }
          ' "$TAG_VERSION"

      - name: Validate package.json version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          node -e '
            const pkg = require("./package.json");
            const tagVersion = process.argv[1];
            if (pkg.version !== tagVersion) {
              console.error(
                `package.json version (${pkg.version}) does not match tag version (${tagVersion}).`
              );
              process.exit(1);
            }
          ' "$TAG_VERSION"

      - name: Publish to VS Code Marketplace
        run: |
          npx @vscode/vsce publish --pat "${{ secrets.VSCODE_PUBLISHER_TOKEN }}"
